<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/styles.css" />

    <title>Carrito - La Cueva Gamer</title>
  </head>

  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">La Cueva Gamer</a>
      </div>

      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
          <li>
            <a href="./carrito.html" class="carrito-icono"
              >🛒 <span id="contador-carrito">0</span></a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
  <h1 class="text-secondary">Carrito de compras</h1>

  <section id="contenedor-carrito" class="contenedor-tarjetas">
    <!-- Los productos del carrito se agregarán aquí con JavaScript -->
  </section>

  <div id="acciones-carrito" class="acciones-carrito">
    <!-- Aquí se mostrarán los botones (Vaciar carrito, Finalizar compra, etc.) -->
  </div>

  <section id="resumen-carrito" class="resumen-carrito">
    <!-- Aquí se mostrará el total de la compra -->
  </section>
    </main>

    <footer>
      <p>Sitio realizado por Brian Montiveros para Talento Tech</p>

      <nav>
        <ul class="footer-list">
          <li>
            <img src="../img/whatsapp.png" alt="Logo WhatsApp" />
          </li>

          <li>
            <img src="../img/social.png" alt="Logo Instagram" />
          </li>

          <li>
            <img src="../img/tik-tok.png" alt="Logo TikTok" />
          </li>
        </ul>
      </nav>
    </footer>

    <script type="module" src="../js/carrito.js"></script>
  </body>
</html>
